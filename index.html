<!doctype html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cosmo Bloom · Studio Projektowo-Inżynierskie</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.tailwindcss.com"></script>

<script>
  // Tailwind config — bring back the project's color tokens
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          'pink-1': '#ff007f',
          'pink-2': '#fbcfe8',
          'pink-deep': '#400020',
          'orange-1': '#ff8000',
        },
        fontFamily: {
          sans: ['Inter', 'system-ui', 'sans-serif'],
          display: ['Outfit', 'sans-serif'],
          mono: ['JetBrains Mono', 'monospace'],
        }
      }
    }
  };
</script>

<style>
  html, body {
    background: #000;
    color: #fff;
    overflow-x: hidden;
    scroll-behavior: smooth;
    -webkit-font-smoothing: antialiased;
    font-family: 'Inter', system-ui, sans-serif;
  }
  @media (hover: hover) and (pointer: fine) {
    html, body, a, button { cursor: none; }
  }
  ::selection { background: #ff007f; color: #fff; }

  .text-glow-pink { text-shadow: 0 0 20px rgba(255, 0, 127, 0.5); }

  .bento-card {
    background: rgba(18, 18, 20, 0.85);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 24px;
    padding: 32px;
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .bento-card:hover {
    border-color: #ff007f;
    background: rgba(255, 0, 127, 0.08);
    box-shadow: 0 20px 60px rgba(255, 0, 127, 0.25);
    transform: translateY(-8px);
  }

  /* hide native scrollbar but keep functionality */
  body::-webkit-scrollbar { width: 0; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* radio chip checked state needs explicit since peer is sibling */
  input[type="radio"]:checked + span {
    background: #ff007f;
    border-color: #ff007f;
    color: #fff;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#000000">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="planet" cx="40%" cy="35%" r="55%">
        <stop offset="0%" stop-color="#FF0080"/>
        <stop offset="35%" stop-color="#FF8000"/>
        <stop offset="70%" stop-color="#FF0080"/>
        <stop offset="100%" stop-color="#400020"/>
      </radialGradient>
    </defs>
    <ellipse cx="600" cy="400" rx="420" ry="60" fill="none" stroke="#FF8000" stroke-width="4" opacity="0.6"/>
    <ellipse cx="600" cy="400" rx="360" ry="50" fill="none" stroke="#FF0080" stroke-width="2" opacity="0.5"/>
    <circle cx="600" cy="400" r="160" fill="url(#planet)"/>
    <text x="600" y="700" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="38" font-weight="700" letter-spacing="4">COSMO BLOOM</text>
  </svg>
</template>
<div id="root"></div>

<script>
  // Tweak defaults — host can rewrite this block
  window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accentHue": 360,
    "motion": 1,
    "cursor": true,
    "ships": true,
    "hud": true
  }/*EDITMODE-END*/;
</script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="background.jsx"></script>
<script type="text/babel" src="hud.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
